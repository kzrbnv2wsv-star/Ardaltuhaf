<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أرض التحف — لوحة الإدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --w:#ffffff; --w2:#f5f5f7; --w3:#fafafa;
    --ink:#1d1d1f; --ink2:#424245; --ink3:#86868b;
    --line:#e8e8ed; --line2:#d2d2d7;
    --brass:#b08a3e; --brass-soft:#c9a456;
    --ok:#1f7a4d; --ok-bg:#e8f5ee;
    --warn:#9a6a00; --warn-bg:#fbf3e0;
    --danger:#c0392b; --danger-bg:#fbeae8;
    --r:18px; --r-sm:12px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
    --shadow:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
    --shadow-lg:0 12px 40px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.05);
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Tajawal',-apple-system,sans-serif;background:var(--w2);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.kufi{font-family:'Noto Kufi Arabic',sans-serif;letter-spacing:-.01em}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
  .bar{max-width:1080px;margin:0 auto;padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:10px}
  .mark{width:34px;height:34px;border-radius:9px;background:var(--ink);display:grid;place-items:center;color:#fff;font-family:'Noto Kufi Arabic';font-weight:700;font-size:16px;overflow:hidden}
  .mark img{width:100%;height:100%;object-fit:cover}
  .brand b{font-family:'Noto Kufi Arabic';font-size:16px;font-weight:600}
  .brand .tag{font-size:12px;color:var(--ink3)}
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:980px;padding:9px 18px;font-size:14px;font-weight:600;transition:all .2s var(--ease)}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-dark:hover{opacity:.85}
  .btn-ghost{background:var(--w2);color:var(--ink);border:1px solid var(--line2)}
  .btn-ghost:hover{background:#ececf0}
  .btn-brass{background:var(--brass);color:#fff}
  .btn-brass:hover{background:var(--brass-soft)}
  .btn-danger{background:var(--danger-bg);color:var(--danger)}
  .btn:active{transform:scale(.97)}

  .wrap{max-width:1080px;margin:0 auto;padding:28px 22px 80px}

  /* تسجيل الدخول */
  .login-screen{min-height:75vh;display:grid;place-items:center}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:38px 34px;width:100%;max-width:380px}
  .login-card h2{font-size:22px;margin-bottom:6px}
  .login-card p{font-size:14px;color:var(--ink3);margin-bottom:24px}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:7px}
  .field .req{color:var(--brass)}
  .field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1px solid var(--line2);border-radius:var(--r-sm);font-size:15px;background:#fff;transition:border .15s var(--ease)}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--brass)}
  .field input.err{border-color:var(--danger)}
  .field textarea{resize:vertical;min-height:64px}
  .hint{font-size:12px;color:var(--ink3);margin-top:5px}

  .msg{padding:10px 14px;border-radius:var(--r-sm);font-size:14px;margin-bottom:16px;font-weight:500}
  .msg.error{background:var(--danger-bg);color:var(--danger)}
  .msg.ok{background:var(--ok-bg);color:var(--ok)}

  /* شريط الإدارة */
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
  .toolbar h1{font-size:26px}
  .toolbar .sub{font-size:13px;color:var(--ink3)}
  .tb-actions{display:flex;gap:10px;flex-wrap:wrap}

  .search-row{position:relative;margin-bottom:18px}
  .search-row input{width:100%;padding:11px 14px;border:1px solid var(--line2);border-radius:980px;font-size:15px;background:#fff}
  .search-row input:focus{outline:none;border-color:var(--brass)}

  /* جدول المنتجات */
  .prod-list{display:grid;gap:10px}
  .prod-row{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;box-shadow:var(--shadow-sm);transition:box-shadow .2s var(--ease)}
  .prod-row:hover{box-shadow:var(--shadow)}
  .pr-thumb{width:54px;height:54px;border-radius:10px;background:var(--w2);display:grid;place-items:center;font-size:24px;overflow:hidden;flex-shrink:0}
  .pr-thumb img{width:100%;height:100%;object-fit:cover}
  .pr-main{flex:1;min-width:0}
  .pr-main h3{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr-meta{font-size:12px;color:var(--ink3);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .pr-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:980px}
  .pr-badge.new{background:rgba(176,138,62,.14);color:var(--brass)}
  .pr-badge.best{background:rgba(29,29,31,.08);color:var(--ink)}
  .pr-price{font-family:'Noto Kufi Arabic';font-weight:700;font-size:15px;white-space:nowrap}
  .pr-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:980px;white-space:nowrap}
  .pr-status.ok{background:var(--ok-bg);color:var(--ok)}
  .pr-status.limited{background:var(--warn-bg);color:var(--warn)}
  .pr-status.out{background:var(--danger-bg);color:var(--danger)}
  .pr-actions{display:flex;gap:6px;flex-shrink:0}
  .icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line2);background:#fff;display:grid;place-items:center;font-size:15px;transition:all .15s var(--ease)}
  .icon-btn:hover{background:var(--w2)}
  .icon-btn.del:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}

  .empty{text-align:center;padding:60px 20px;color:var(--ink3)}
  .empty .big{font-size:42px;margin-bottom:10px}
  .loading{text-align:center;padding:50px;color:var(--ink3)}

  /* نافذة التعديل */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:.3s var(--ease);z-index:60}
  .overlay.open{opacity:1;visibility:visible}
  .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-48%);background:#fff;border-radius:var(--r);box-shadow:var(--shadow-lg);width:calc(100% - 40px);max-width:560px;max-height:88vh;overflow-y:auto;opacity:0;visibility:hidden;transition:.3s var(--ease);z-index:61;direction:rtl}
  .modal.open{opacity:1;visibility:visible;transform:translate(-50%,-50%)}
  .modal-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;z-index:2}
  .modal-head h2{font-size:18px}
  .close{width:32px;height:32px;border-radius:50%;border:none;background:var(--w2);font-size:16px;display:grid;place-items:center}
  .modal-body{padding:22px 24px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .modal-foot{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:16px 24px;display:flex;gap:10px;justify-content:flex-start}
  .checks{display:flex;gap:20px;margin-top:4px}
  .check{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:500}
  .check input{width:auto}

  /* رفع صورة */
  .img-up{display:flex;align-items:center;gap:14px}
  .img-prev{width:72px;height:72px;border-radius:12px;background:var(--w2);display:grid;place-items:center;font-size:28px;overflow:hidden;flex-shrink:0;border:1px solid var(--line)}
  .img-prev img{width:100%;height:100%;object-fit:cover}
  .file-label{display:inline-block;padding:8px 14px;background:var(--w2);border:1px solid var(--line2);border-radius:var(--r-sm);font-size:13px;font-weight:600}
  .file-label:hover{background:#ececf0}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:980px;font-size:14px;font-weight:500;opacity:0;visibility:hidden;transition:.3s var(--ease);z-index:80;box-shadow:var(--shadow-lg)}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}

  @media(max-width:640px){
    .grid2{grid-template-columns:1fr}
    .pr-price,.pr-meta{display:none}
    .toolbar h1{font-size:22px}
  }
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand">
      <div class="mark" id="brand-mark">أ</div>
      <div><b>أرض التحف</b><div class="tag">لوحة الإدارة</div></div>
    </div>
    <div id="header-actions"></div>
  </div>
</header>

<!-- شاشة تسجيل الدخول -->
<div class="wrap login-screen" id="login-view" style="display:none">
  <div class="login-card">
    <h2>تسجيل الدخول</h2>
    <p>أدخل بيانات حساب الإدارة للمتابعة</p>
    <div id="login-msg"></div>
    <div class="field"><label>البريد الإلكتروني</label><input id="login-email" type="email" placeholder="you@example.com" autocomplete="username"></div>
    <div class="field"><label>كلمة المرور</label><input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-dark" id="login-btn" style="width:100%;justify-content:center;padding:12px">دخول</button>
  </div>
</div>

<!-- لوحة الإدارة -->
<div class="wrap" id="admin-view" style="display:none">
  <div class="toolbar">
    <div>
      <h1>إدارة المنتجات</h1>
      <div class="sub" id="count-sub">—</div>
    </div>
    <div class="tb-actions">
      <button class="btn btn-ghost" id="logo-btn">🖼️ شعار الشركة</button>
      <button class="btn btn-brass" id="add-btn">＋ منتج جديد</button>
    </div>
  </div>

  <div class="search-row"><input id="admin-search" placeholder="ابحث بالاسم أو الكود (SKU)..."></div>

  <div id="list-area"><div class="loading">جارٍ التحميل…</div></div>
</div>

<!-- نافذة إضافة/تعديل -->
<div class="overlay" id="overlay"></div>
<div class="modal" id="modal">
  <div class="modal-head"><h2 id="modal-title">منتج جديد</h2><button class="close" id="modal-close">✕</button></div>
  <div class="modal-body">
    <div id="modal-msg"></div>
    <div class="field">
      <label>الصورة</label>
      <div class="img-up">
        <div class="img-prev" id="img-prev">✦</div>
        <div>
          <label class="file-label">اختر صورة<input type="file" id="img-file" accept="image/*" hidden></label>
          <div class="hint">JPG أو PNG — يُفضّل ضغطها قبل الرفع</div>
        </div>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>الكود SKU <span class="req">*</span></label><input id="m-sku" placeholder="GF-1024"></div>
      <div class="field"><label>الاسم <span class="req">*</span></label><input id="m-name" placeholder="اسم المنتج"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>التصنيف</label><input id="m-cat" placeholder="هدايا / ديكور وتحف" list="cat-list"><datalist id="cat-list"></datalist></div>
      <div class="field"><label>الرمز (بديل الصورة)</label><input id="m-glyph" placeholder="✦" maxlength="3"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>سعر الدرزن (ر.س)</label><input id="m-dozen" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="field"><label>سعر الكرتون (ر.س)</label><input id="m-carton" type="number" inputmode="decimal" placeholder="0"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>شدّ الكرتون (قطعة)</label><input id="m-packing" type="number" inputmode="numeric" placeholder="0"></div>
      <div class="field"><label>حالة التوفر</label><select id="m-status"><option>متوفر</option><option>كمية محدودة</option><option>نفد</option></select></div>
    </div>
    <div class="field"><label>الوصف</label><textarea id="m-descr" placeholder="وصف مختصر للمنتج"></textarea></div>
    <div class="field"><label>المواصفات</label><textarea id="m-specs" placeholder="الخامة: ... | المقاس: ... | الألوان: ..."></textarea><div class="hint">افصل بين المواصفات بعلامة |</div></div>
    <div class="field">
      <label>شارات</label>
      <div class="checks">
        <label class="check"><input type="checkbox" id="m-new"> جديد</label>
        <label class="check"><input type="checkbox" id="m-best"> الأكثر طلباً</label>
      </div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-brass" id="save-btn">حفظ</button>
    <button class="btn btn-ghost" id="cancel-btn">إلغاء</button>
  </div>
</div>

<input type="file" id="logo-file" accept="image/*" hidden>
<div class="toast" id="toast"></div>

<script>
/* ===== إعدادات Supabase ===== */
const SB_URL='https://euncgsgyjrbicvzhjzxv.supabase.co';
const SB_KEY='sb_publishable_BXuV57fRTwLREcHrhXOGPw_rKlVQN7_';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const $=s=>document.querySelector(s);
const toAr=n=>String(n).replace(/[0-9]/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);
const fmt=n=>toAr(Number(n||0).toLocaleString('en-US'));
let PRODUCTS=[], editingId=null, pendingImage=null, searchTerm='';

function showToast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);}
function msg(where,text,type){const el=$(where);if(!text){el.innerHTML='';return;}el.innerHTML=`<div class="msg ${type}">${text}</div>`;}
function stClass(s){return s==='متوفر'?'ok':s==='كمية محدودة'?'limited':'out';}

/* ===== المصادقة ===== */
async function checkSession(){
  const {data}=await sb.auth.getSession();
  if(data.session){showAdmin();}else{showLogin();}
}
function showLogin(){
  $('#login-view').style.display='grid';
  $('#admin-view').style.display='none';
  $('#header-actions').innerHTML='';
}
function showAdmin(){
  $('#login-view').style.display='none';
  $('#admin-view').style.display='block';
  $('#header-actions').innerHTML='<button class="btn btn-ghost" id="logout-btn">خروج</button>';
  $('#logout-btn').onclick=logout;
  loadLogo();
  loadProducts();
}
async function login(){
  const email=$('#login-email').value.trim(), pass=$('#login-pass').value;
  if(!email||!pass){msg('#login-msg','الرجاء إدخال البريد وكلمة المرور','error');return;}
  $('#login-btn').textContent='جارٍ الدخول…';$('#login-btn').disabled=true;
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  $('#login-btn').textContent='دخول';$('#login-btn').disabled=false;
  if(error){msg('#login-msg','فشل الدخول: تأكد من البريد وكلمة المرور','error');return;}
  msg('#login-msg','','');
  showAdmin();
}
async function logout(){await sb.auth.signOut();showLogin();}

/* ===== تحميل المنتجات ===== */
async function loadProducts(){
  $('#list-area').innerHTML='<div class="loading">جارٍ التحميل…</div>';
  const {data,error}=await sb.from('products').select('*').order('sort_order',{ascending:true});
  if(error){$('#list-area').innerHTML='<div class="empty"><div class="big">⚠️</div>تعذّر تحميل المنتجات</div>';return;}
  PRODUCTS=data||[];
  renderCats();
  renderList();
}
function renderCats(){
  const cats=[...new Set(PRODUCTS.map(p=>p.cat).filter(Boolean))];
  $('#cat-list').innerHTML=cats.map(c=>`<option value="${c}">`).join('');
}
function renderList(){
  const t=searchTerm.trim().toLowerCase();
  const list=PRODUCTS.filter(p=>!t||(p.name||'').toLowerCase().includes(t)||(p.sku||'').toLowerCase().includes(t));
  $('#count-sub').textContent=`${toAr(PRODUCTS.length)} منتج`;
  if(!PRODUCTS.length){$('#list-area').innerHTML='<div class="empty"><div class="big">📦</div>لا توجد منتجات بعد<br><span style="font-size:13px">اضغط «منتج جديد» للبدء</span></div>';return;}
  if(!list.length){$('#list-area').innerHTML='<div class="empty"><div class="big">🔍</div>لا نتائج مطابقة</div>';return;}
  $('#list-area').innerHTML='<div class="prod-list">'+list.map(p=>`
    <div class="prod-row">
      <div class="pr-thumb">${p.image_url?`<img src="${p.image_url}" alt="">`:(p.glyph||'✦')}</div>
      <div class="pr-main">
        <h3>${p.name||'—'} ${p.is_new?'<span class="pr-badge new">جديد</span>':''}${p.is_best?'<span class="pr-badge best">الأكثر طلباً</span>':''}</h3>
        <div class="pr-meta"><span>${p.sku||''}</span>${p.cat?`<span>· ${p.cat}</span>`:''}<span>· شدّ ${toAr(p.packing||0)}</span></div>
      </div>
      <div class="pr-price">${fmt(p.dozen)} <span style="font-size:11px;color:var(--ink3)">ر.س/درزن</span></div>
      <span class="pr-status ${stClass(p.status)}">${p.status||'متوفر'}</span>
      <div class="pr-actions">
        <button class="icon-btn" data-edit="${p.id}" title="تعديل">✎</button>
        <button class="icon-btn del" data-del="${p.id}" title="حذف">🗑</button>
      </div>
    </div>`).join('')+'</div>';
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openModal(b.dataset.edit));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delProduct(b.dataset.del));
}

/* ===== نافذة الإضافة/التعديل ===== */
function openModal(id){
  editingId=id||null;pendingImage=null;
  msg('#modal-msg','','');
  const p=id?PRODUCTS.find(x=>String(x.id)===String(id)):{};
  $('#modal-title').textContent=id?'تعديل المنتج':'منتج جديد';
  $('#m-sku').value=p.sku||'';
  $('#m-name').value=p.name||'';
  $('#m-cat').value=p.cat||'';
  $('#m-glyph').value=p.glyph||'';
  $('#m-dozen').value=p.dozen||'';
  $('#m-carton').value=p.carton||'';
  $('#m-packing').value=p.packing||'';
  $('#m-status').value=p.status||'متوفر';
  $('#m-descr').value=p.descr||'';
  $('#m-specs').value=p.specs||'';
  $('#m-new').checked=!!p.is_new;
  $('#m-best').checked=!!p.is_best;
  $('#img-file').value='';
  $('#img-prev').innerHTML=p.image_url?`<img src="${p.image_url}">`:(p.glyph||'✦');
  $('#overlay').classList.add('open');$('#modal').classList.add('open');
}
function closeModal(){$('#overlay').classList.remove('open');$('#modal').classList.remove('open');}

$('#img-file').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  pendingImage=f;
  const url=URL.createObjectURL(f);
  $('#img-prev').innerHTML=`<img src="${url}">`;
};

async function uploadImage(file,sku){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=`products/${sku||'item'}-${Date.now()}.${ext}`;
  const {error}=await sb.storage.from('media').upload(path,file,{upsert:true});
  if(error)throw error;
  const {data}=sb.storage.from('media').getPublicUrl(path);
  return data.publicUrl;
}

async function saveProduct(){
  const sku=$('#m-sku').value.trim(), name=$('#m-name').value.trim();
  if(!sku||!name){msg('#modal-msg','الكود والاسم حقول إجبارية','error');return;}
  $('#save-btn').textContent='جارٍ الحفظ…';$('#save-btn').disabled=true;
  try{
    let image_url=editingId?(PRODUCTS.find(x=>String(x.id)===String(editingId))||{}).image_url:null;
    if(pendingImage){image_url=await uploadImage(pendingImage,sku);}
    const row={
      sku,name,
      cat:$('#m-cat').value.trim()||null,
      glyph:$('#m-glyph').value.trim()||null,
      image_url:image_url||null,
      dozen:parseFloat($('#m-dozen').value)||null,
      carton:parseFloat($('#m-carton').value)||null,
      packing:parseInt($('#m-packing').value)||null,
      status:$('#m-status').value,
      descr:$('#m-descr').value.trim()||null,
      specs:$('#m-specs').value.trim()||null,
      is_new:$('#m-new').checked,
      is_best:$('#m-best').checked
    };
    if(editingId){
      const {error}=await sb.from('products').update(row).eq('id',editingId);
      if(error)throw error;
      showToast('تم تحديث المنتج');
    }else{
      row.sort_order=(PRODUCTS.reduce((m,p)=>Math.max(m,p.sort_order||0),0))+1;
      const {error}=await sb.from('products').insert(row);
      if(error)throw error;
      showToast('تمت إضافة المنتج');
    }
    closeModal();loadProducts();
  }catch(e){
    let t='تعذّر الحفظ';
    if(e.code==='23505'||/duplicate|unique/i.test(e.message||''))t='الكود SKU مستخدم بالفعل — اختر كوداً آخر';
    msg('#modal-msg',t,'error');
  }finally{
    $('#save-btn').textContent='حفظ';$('#save-btn').disabled=false;
  }
}

async function delProduct(id){
  const p=PRODUCTS.find(x=>String(x.id)===String(id));
  if(!confirm(`حذف المنتج «${p?p.name:''}»؟ لا يمكن التراجع.`))return;
  const {error}=await sb.from('products').delete().eq('id',id);
  if(error){showToast('تعذّر الحذف');return;}
  showToast('تم الحذف');loadProducts();
}

/* ===== شعار الشركة ===== */
async function loadLogo(){
  try{
    const {data}=sb.storage.from('media').getPublicUrl('branding/logo.png');
    // نتحقق أنه موجود فعلاً
    const res=await fetch(data.publicUrl,{method:'HEAD',cache:'no-store'});
    if(res.ok){$('#brand-mark').innerHTML=`<img src="${data.publicUrl}?t=${Date.now()}">`;}
  }catch(e){}
}
$('#logo-btn').onclick=()=>$('#logo-file').click();
$('#logo-file').onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  showToast('جارٍ رفع الشعار…');
  try{
    const {error}=await sb.storage.from('media').upload('branding/logo.png',f,{upsert:true,contentType:f.type});
    if(error)throw error;
    showToast('تم تحديث الشعار');
    loadLogo();
  }catch(err){showToast('تعذّر رفع الشعار');}
};

/* ===== الربط ===== */
$('#login-btn').onclick=login;
$('#login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
$('#add-btn').onclick=()=>openModal(null);
$('#save-btn').onclick=saveProduct;
$('#cancel-btn').onclick=closeModal;
$('#modal-close').onclick=closeModal;
$('#overlay').onclick=closeModal;
$('#admin-search').oninput=e=>{searchTerm=e.target.value;renderList();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

checkSession();
</script>
